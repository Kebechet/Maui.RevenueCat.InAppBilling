name: publish-ios
on: workflow_dispatch

env:
  DOTNET_NOLOGO: true                     # Disable the .NET logo
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true # Disable the .NET first time experience
  DOTNET_CLI_TELEMETRY_OPTOUT: true       # Disable sending .NET CLI telemetry

  DOTNET_SDK_VERSION: 9.0.101
  BUILD_CONFIGURATION: Release

  #https://github.com/actions/runner-images/tree/main/images/macos
  #https://developer.apple.com/support/xcode/
  #https://xcodereleases.com/
  XCODE_VERSION: 16.4

  PROJECT_APP_PATH_FOLDER: src/Maui.RevenueCat.iOS
  PROJECT_PATH: src/Maui.RevenueCat.iOS/Maui.RevenueCat.iOS.csproj 

  ARTIFACT_FOLDER: ~/artifacts

jobs:
  build-ios:
    name: Build and publish iOS binary
    runs-on: macos-15
    permissions:
      packages: write
      contents: read
    steps:
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_${{env.XCODE_VERSION}}.app

      - uses: actions/checkout@v4

      - name: Create global.json to specify .NET version
        run: |
            echo '{"sdk":{"version":"${{ env.DOTNET_SDK_VERSION }}"}}' > ${{github.workspace}}/global.json

      - name: Setup .NET Core SDK ${{ env.DOTNET_SDK_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI iOS
        run: dotnet workload install ios maui-ios --ignore-failed-sources --version ${{ env.DOTNET_SDK_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_PATH }} --ignore-failed-sources 

      - name: Build MAUI iOS
        run: >
          dotnet build ${{ env.PROJECT_PATH }}
          -c ${{ env.BUILD_CONFIGURATION }}
          --no-restore

      - name: Validate native linker (registrar.o vs framework symbols)
        # The binding build above only does C# compilation + bgen — the
        # native linker never runs, so unexported ObjC class symbols slip
        # through (this is how the broken 5.72.0 got onto NuGet).
        #
        # BindingLinkerCheck is a minimal ios-arm64 Exe that ProjectReferences
        # the binding and `typeof()`s every declared type, forcing the iOS
        # registrar to emit `_OBJC_CLASS_$_X` for each one. `dotnet publish`
        # for a device RID drives the full registrar + native link pass; any
        # symbol missing from RevenueCat.framework fails the step with the
        # same "Undefined symbols for architecture arm64" error consumers
        # would otherwise hit at app-link time.
        run: >
          dotnet publish tests/BindingLinkerCheck/BindingLinkerCheck.csproj
          -c ${{ env.BUILD_CONFIGURATION }}
          -f net9.0-ios
          -r ios-arm64

      - name: Pack NuGet Package
        run: >
          dotnet pack ${{ env.PROJECT_PATH }} 
          -o ${{env.ARTIFACT_FOLDER}} 
          --no-build
          --no-restore
          --include-symbols 
          --include-source

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            ${{env.ARTIFACT_FOLDER}}/*.nupkg
            ${{env.ARTIFACT_FOLDER}}/*.snupkg

      - name: Publish Nuget
        run: >
          dotnet nuget push ${{env.ARTIFACT_FOLDER}}/*.nupkg 
          --api-key ${{ secrets.NUGET_API_KEY }} 
          --source https://api.nuget.org/v3/index.json

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ${{env.ARTIFACT_FOLDER}}/*.nupkg
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          --skip-duplicate