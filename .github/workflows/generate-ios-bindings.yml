name: generate-ios-bindings

on:
  workflow_dispatch:
    inputs:
      revenuecat_version:
        description: 'RevenueCat purchases-ios version (e.g. 5.72.0). Leave empty to use the latest GitHub release.'
        required: false
        default: ''

jobs:
  generate-bindings:
    name: Generate iOS Bindings
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        # .NET 10 for the file-based post-processor script + tests; .NET 9.0.101
        # for the native-linker validation, whose `ios` workload is pinned to a
        # version compatible with the Xcode on the runner (mirrors
        # publish-ios.yml). The .NET 10 `ios` workload requires Xcode 26.5,
        # which the macos image doesn't carry yet.
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.101
            10.0.x

      - name: Run post-processor tests
        # Fail fast if the post-processor regressed before we spend time on
        # sharpie. Tests invoke the script via subprocess, so they cover the
        # exact code path used by the cleanup step below.
        run: dotnet test tests/Postprocess.Tests/Postprocess.Tests.csproj --nologo

      - name: Resolve RevenueCat version
        id: rc_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          INPUT_VERSION="${{ inputs.revenuecat_version }}"

          if [ -z "$INPUT_VERSION" ]; then
            echo "🔍 Fetching latest release tag from RevenueCat/purchases-ios..."
            RC_VERSION=$(gh release view --repo RevenueCat/purchases-ios --json tagName --jq '.tagName')
          else
            RC_VERSION="$INPUT_VERSION"
          fi

          if [ -z "$RC_VERSION" ]; then
            echo "❌ Error: Could not determine RevenueCat version"
            exit 1
          fi

          echo "✅ RevenueCat Version: $RC_VERSION"

          echo "RC_VERSION=$RC_VERSION" >> "$GITHUB_ENV"
          echo "version=$RC_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Objective Sharpie
        run: |
          set -euo pipefail
          echo "📦 Installing Objective Sharpie..."
          brew install --cask objectivesharpie || echo "⚠️  Objective Sharpie may already be installed"
          sharpie -v

      - name: Detect iOS SDK
        run: |
          set -euo pipefail
          echo "🔍 Available iOS SDKs:"
          sharpie xcode -sdks

          IOS_SDK=$(sharpie xcode -sdks 2>&1 | grep -i iphoneos | grep -o 'iphoneos[0-9.]*' | tail -1)

          if [ -z "$IOS_SDK" ]; then
            echo "❌ Error: Could not detect iOS SDK"
            sharpie xcode -sdks
            exit 1
          fi

          echo "✅ Selected iOS SDK: $IOS_SDK"
          echo "IOS_SDK=$IOS_SDK" >> "$GITHUB_ENV"

      - name: Checkout RevenueCat/purchases-ios source at tag
        # The fix for issue #116 (Test Store API keys force-closing iOS apps)
        # requires building the xcframework with the
        # BYPASS_SIMULATED_STORE_RELEASE_CHECK Swift compilation flag set.
        # RevenueCat's pre-built `RevenueCat.xcframework.zip` release asset
        # is always built in Release configuration without the flag, so its
        # `#if !DEBUG && !BYPASS_SIMULATED_STORE_RELEASE_CHECK` guard always
        # triggers and force-closes any app initialised with a `test_…` key.
        # Mirrors RevenueCat/purchases-kmp's `kn-core/build.gradle.kts`
        # (`swiftSettings { define("BYPASS_SIMULATED_STORE_RELEASE_CHECK") }`).
        uses: actions/checkout@v4
        with:
          repository: RevenueCat/purchases-ios
          ref: ${{ env.RC_VERSION }}
          path: purchases-ios-src
          submodules: recursive

      - name: Write Local.xcconfig with BYPASS_SIMULATED_STORE_RELEASE_CHECK
        # Local.xcconfig is read by RevenueCat.xcodeproj and by Package.swift
        # (see `additionalCompilerFlags` in purchases-ios' Package.swift).
        # The format documented in Local.xcconfig.SAMPLE:
        #   SWIFT_ACTIVE_COMPILATION_CONDITIONS = $(inherited) NEW_FLAG
        run: |
          set -euo pipefail
          cat > purchases-ios-src/Local.xcconfig <<'XCCONFIG'
          // Generated by .github/workflows/generate-ios-bindings.yml
          // Enables the BYPASS_SIMULATED_STORE_RELEASE_CHECK compilation flag so
          // the resulting RevenueCat.xcframework does NOT force-close consumer
          // apps that use a Test Store API key (`test_…`). See:
          //   https://github.com/RevenueCat/purchases-kmp/issues/823
          SWIFT_ACTIVE_COMPILATION_CONDITIONS = $(inherited) BYPASS_SIMULATED_STORE_RELEASE_CHECK
          XCCONFIG
          echo "✅ Wrote Local.xcconfig:"
          cat purchases-ios-src/Local.xcconfig

      - name: Verify BYPASS_SIMULATED_STORE_RELEASE_CHECK is active
        # Positively confirm that Global.xcconfig's `#include? "Local.xcconfig"`
        # actually pulled our flag into the RevenueCat target's *resolved*
        # build settings. This is far more reliable than grepping the built
        # binary for an absent symbol: `checkForSimulatedStoreAPIKeyInRelease`
        # is an internal Swift method that need not appear in the external
        # symbol table at all, so an absence-based `nm` check can pass for the
        # wrong reason whether or not the flag took effect. Resolving the build
        # setting is a direct, positive signal. Run before the (~15 min)
        # archive so a mis-wired flag fails fast.
        run: |
          set -euo pipefail
          cd purchases-ios-src

          # `|| true`: grep exiting non-zero (no match) or head closing the
          # pipe early (SIGPIPE) must not trip `set -e` here — we want the
          # explicit check below to produce the diagnostic, not an opaque abort.
          SETTINGS=$(xcodebuild -project RevenueCat.xcodeproj \
            -scheme RevenueCat \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -showBuildSettings 2>/dev/null) || true
          RESOLVED=$(echo "$SETTINGS" | grep -E '^[[:space:]]*SWIFT_ACTIVE_COMPILATION_CONDITIONS' | head -1 || true)

          echo "Resolved: $RESOLVED"

          if ! echo "$RESOLVED" | grep -q 'BYPASS_SIMULATED_STORE_RELEASE_CHECK'; then
            echo "❌ Error: BYPASS_SIMULATED_STORE_RELEASE_CHECK is absent from the"
            echo "   resolved SWIFT_ACTIVE_COMPILATION_CONDITIONS. Global.xcconfig's"
            echo "   '#include? \"Local.xcconfig\"' did not pick up our Local.xcconfig."
            exit 1
          fi

          echo "✅ BYPASS_SIMULATED_STORE_RELEASE_CHECK active in resolved build settings."

      - name: Build RevenueCat.xcframework from source
        # xcodebuild archive + -create-xcframework, the same recipe Apple
        # documents for producing distributable binary frameworks. We build
        # device (iphoneos) and simulator (iphonesimulator) slices, then
        # combine them. BUILD_LIBRARY_FOR_DISTRIBUTION=YES emits the stable
        # module interface (.swiftinterface) required for cross-Xcode-version
        # consumption, and SKIP_INSTALL=NO forces the framework into the
        # archive's Products dir where -create-xcframework can find it.
        run: |
          set -euo pipefail
          cd purchases-ios-src

          ARCHIVES_DIR="${GITHUB_WORKSPACE}/xcframework-archives"
          mkdir -p "$ARCHIVES_DIR"

          echo "📦 Archiving RevenueCat for iphoneos..."
          xcodebuild archive \
            -project RevenueCat.xcodeproj \
            -scheme RevenueCat \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVES_DIR/RevenueCat-iphoneos.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

          echo "📦 Archiving RevenueCat for iphonesimulator..."
          xcodebuild archive \
            -project RevenueCat.xcodeproj \
            -scheme RevenueCat \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -archivePath "$ARCHIVES_DIR/RevenueCat-iphonesimulator.xcarchive" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES

          echo "🧩 Combining slices into xcframework..."
          OUT_DIR="${GITHUB_WORKSPACE}/src/Maui.RevenueCat.iOS"
          rm -rf "$OUT_DIR/RevenueCat.xcframework"

          xcodebuild -create-xcframework \
            -framework "$ARCHIVES_DIR/RevenueCat-iphoneos.xcarchive/Products/Library/Frameworks/RevenueCat.framework" \
            -debug-symbols "$ARCHIVES_DIR/RevenueCat-iphoneos.xcarchive/dSYMs/RevenueCat.framework.dSYM" \
            -framework "$ARCHIVES_DIR/RevenueCat-iphonesimulator.xcarchive/Products/Library/Frameworks/RevenueCat.framework" \
            -debug-symbols "$ARCHIVES_DIR/RevenueCat-iphonesimulator.xcarchive/dSYMs/RevenueCat.framework.dSYM" \
            -output "$OUT_DIR/RevenueCat.xcframework"

          echo "✅ RevenueCat.xcframework built from source with BYPASS_SIMULATED_STORE_RELEASE_CHECK"
          ls -la "$OUT_DIR/RevenueCat.xcframework"

      - name: Clean xcframework (strip swiftmodule/dSYM)
        # The same cleanups the old download-based flow applied — required
        # for the Windows build path (which trips on long `.swiftmodule`
        # paths) and to suppress NU5123 path-too-long pack warnings.
        run: |
          set -euo pipefail
          cd src/Maui.RevenueCat.iOS

          FRAMEWORK_DIR="RevenueCat.xcframework"

          echo "🧹 Removing .swiftmodule and .dSYM directories (required for Windows build)..."
          find "$FRAMEWORK_DIR" -type d -name "*.swiftmodule" -exec rm -rf {} + 2>/dev/null || true
          find "$FRAMEWORK_DIR" -type d -name "*.dSYM" -exec rm -rf {} + 2>/dev/null || true
          # Top-level `dSYMs/` folders are referenced by Info.plist's
          # `DebugSymbolsPath`; drop them too so `dotnet pack` doesn't try to
          # include them via the plist (the deeper `*.dSYM` rule above misses
          # the wrapping `dSYMs/` parent).
          find "$FRAMEWORK_DIR" -type d -name "dSYMs" -exec rm -rf {} + 2>/dev/null || true
          echo "✅ .swiftmodule and .dSYM directories removed"

          echo "🧹 Stripping DebugSymbolsPath entries from Info.plist (NU5123 path-too-long warnings)..."
          # `dotnet pack` reads `DebugSymbolsPath` from the xcframework's
          # top-level Info.plist and expands it to dSYM file references, which
          # produces the NU5123 path-too-long warning during pack even when the
          # dSYM directories themselves have been deleted. Drop the keys here
          # so the pack target has nothing to expand. python3 ships with the
          # macos-latest runner; plistlib handles binary or XML plists.
          python3 - "$FRAMEWORK_DIR/Info.plist" <<'PY'
          import plistlib, sys
          path = sys.argv[1]
          with open(path, "rb") as f:
              data = plistlib.load(f)
          for lib in data.get("AvailableLibraries", []):
              lib.pop("DebugSymbolsPath", None)
          with open(path, "wb") as f:
              plistlib.dump(data, f)
          PY
          echo "✅ DebugSymbolsPath entries stripped"

          echo "📁 Framework structure:"
          ls -la "$FRAMEWORK_DIR"

      - name: Verify framework structure
        run: |
          set -euo pipefail
          echo "🔍 Verifying framework structure..."
          cd src/Maui.RevenueCat.iOS

          FRAMEWORK_DIR="RevenueCat.xcframework"
          FRAMEWORK_PATH="$FRAMEWORK_DIR/ios-arm64/RevenueCat.framework"
          FRAMEWORK_HEADERS="$FRAMEWORK_PATH/Headers"

          for h in "$FRAMEWORK_HEADERS/RevenueCat.h" "$FRAMEWORK_HEADERS/RevenueCat-Swift.h"; do
            if [ ! -f "$h" ]; then
              echo "❌ Error: required header not found at $h"
              ls -la "$FRAMEWORK_HEADERS" || true
              exit 1
            fi
          done

          echo "✅ Framework structure verified"
          echo "  Framework:    $FRAMEWORK_PATH"
          echo "  Headers dir:  $FRAMEWORK_HEADERS"

      - name: Generate bindings with Objective Sharpie
        run: |
          set -euo pipefail
          echo "⚙️  Generating bindings with Objective Sharpie..."
          cd src/Maui.RevenueCat.iOS

          # Matches the invocation documented in src/Maui.RevenueCat.iOS/README.md:
          #   sharpie bind -framework ios-arm64/RevenueCat.framework \
          #     -sdk iphoneosXX.Y -scope ios-arm64/RevenueCat.framework/Headers
          # Framework-mode goes through the umbrella header so both RevenueCat.h
          # and RevenueCat-Swift.h are bound (vs. passing one header positionally,
          # which would miss symbols from the other).
          FRAMEWORK_DIR="RevenueCat.xcframework"
          OUTPUT_DIR="RevenueCatBindingOutput"
          NAMESPACE="Maui.RevenueCat.iOS"
          FRAMEWORK_PATH="$FRAMEWORK_DIR/ios-arm64/RevenueCat.framework"
          FRAMEWORK_HEADERS="$FRAMEWORK_PATH/Headers"

          rm -rf "$OUTPUT_DIR"

          echo "Running: sharpie bind -framework $FRAMEWORK_PATH -sdk $IOS_SDK -scope $FRAMEWORK_HEADERS --namespace=$NAMESPACE"

          sharpie bind \
            -framework "$FRAMEWORK_PATH" \
            -sdk "$IOS_SDK" \
            -scope "$FRAMEWORK_HEADERS" \
            -output "$OUTPUT_DIR" \
            -namespace "$NAMESPACE"

          echo "✅ Bindings generated"

      - name: Apply README-documented cleanups
        run: |
          set -euo pipefail
          cd src/Maui.RevenueCat.iOS/RevenueCatBindingOutput

          # Runs the .NET 10 file-based script that applies every deterministic
          # cleanup documented in src/Maui.RevenueCat.iOS/README.md. See the
          # script header for the full list of passes and the per-pass rules.
          dotnet run "${GITHUB_WORKSPACE}/.github/scripts/postprocess_ios_bindings.cs" -- \
            ApiDefinitions.cs \
            StructsAndEnums.cs \
            --report manual_review.md

      - name: Select Xcode 16.4 and pin .NET 9 for iOS validation
        # Validate with the proven publish-ios.yml pair: Xcode 16.4 + the
        # .NET 9.0.101 `ios` workload. The newest Xcode on the image (26.3) is
        # still too old for the .NET 10 `ios` workload (needs 26.5). The
        # global.json pins every dotnet invocation from here on (workload
        # install + the validation build) to 9.0.101; the post-processor steps
        # above already ran under .NET 10, and no later step uses dotnet.
        run: |
          set -euo pipefail
          echo "Available Xcodes:"
          ls -d /Applications/Xcode_*.app 2>/dev/null || true
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version
          echo '{"sdk":{"version":"9.0.101","rollForward":"latestFeature"}}' > "${GITHUB_WORKSPACE}/global.json"

      - name: Install iOS workload (for native linker validation)
        # The validation step below builds BindingLinkerCheck (and the binding
        # project) for net9.0-ios, which needs the `ios` workload — the macos
        # image no longer ships it preinstalled. `--version 9.0.101` pins the
        # workload MANIFEST to the 9.0.1xx (Xcode-16.4-era) band — without it,
        # the install resolves the latest manifest (net9.0_26.5, which needs
        # Xcode 26.5) even under the 9.0.101 SDK. Matches publish-ios.yml
        # exactly. Placed here (not at the top) so the cheap fast-fail steps
        # run before this ~minutes-long install.
        run: dotnet workload install ios maui-ios --version 9.0.101 --ignore-failed-sources

      - name: Validate native linker against fresh bindings
        # Drop the cleaned bindings + xcframework into src/Maui.RevenueCat.iOS/
        # and build BindingLinkerCheck for ios-arm64. This is the earliest
        # point where unexported ObjC class symbols (e.g. RevenueCat's
        # internal helpers that sharpie binds but the dylib doesn't export)
        # surface as "Undefined symbols for architecture arm64" — the same
        # failure that broke 5.72.0 in downstream consumers.
        #
        # Failing here means the post-processor's LinkerRiskSymbols list
        # needs a new entry. Inspect the error and add the offending name.
        run: |
          set -euo pipefail
          cd src/Maui.RevenueCat.iOS

          cp RevenueCatBindingOutput/ApiDefinitions.cs ApiDefinitions.cs
          cp RevenueCatBindingOutput/StructsAndEnums.cs StructsAndEnums.cs
          rm -rf nativelib/RevenueCat.xcframework
          cp -r RevenueCat.xcframework nativelib/RevenueCat.xcframework

          cd "$GITHUB_WORKSPACE"
          dotnet publish tests/BindingLinkerCheck/BindingLinkerCheck.csproj \
            -c Release \
            -f net9.0-ios \
            -r ios-arm64

      - name: Display generated artifacts
        run: |
          set -euo pipefail
          cd src/Maui.RevenueCat.iOS

          OUTPUT_DIR="RevenueCatBindingOutput"
          echo "📄 Generated Artifacts:"
          echo "════════════════════════════════════════════════════════"

          for f in ApiDefinitions.cs StructsAndEnums.cs; do
            FILE_PATH="$OUTPUT_DIR/$f"
            if [ -f "$FILE_PATH" ]; then
              FILE_SIZE=$(ls -lh "$FILE_PATH" | awk '{print $5}')
              LINE_COUNT=$(wc -l < "$FILE_PATH")
              VERIFY_COUNT=$(grep -c "\[Verify" "$FILE_PATH" 2>/dev/null || echo "0")
              echo "✅ $f"
              echo "   Size: $FILE_SIZE"
              echo "   Lines: $LINE_COUNT"
              echo "   Remaining [Verify] attributes: $VERIFY_COUNT"
              echo ""
            else
              echo "❌ $f not found"
            fi
          done

          echo "════════════════════════════════════════════════════════"
          echo "📋 ApiDefinitions.cs Preview (first 50 lines):"
          echo "────────────────────────────────────────────────────────"
          head -50 "$OUTPUT_DIR/ApiDefinitions.cs" || true
          echo "────────────────────────────────────────────────────────"
          echo ""
          echo "📋 StructsAndEnums.cs Preview (first 50 lines):"
          echo "────────────────────────────────────────────────────────"
          head -50 "$OUTPUT_DIR/StructsAndEnums.cs" || true
          echo "────────────────────────────────────────────────────────"

      # The artifact steps below run with `if: ${{ !cancelled() }}` so a failure
      # in the binding-focused "Validate native linker" step (e.g. fresh sharpie
      # output with dangling references to dropped linker-risk symbols, which
      # always needs manual cleanup) does not discard the successfully-built
      # xcframework or the bindings/report needed for that manual review.
      - name: Upload ApiDefinitions.cs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ApiDefinitions-${{ env.RC_VERSION }}
          path: src/Maui.RevenueCat.iOS/RevenueCatBindingOutput/ApiDefinitions.cs
          retention-days: 30

      - name: Upload StructsAndEnums.cs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: StructsAndEnums-${{ env.RC_VERSION }}
          path: src/Maui.RevenueCat.iOS/RevenueCatBindingOutput/StructsAndEnums.cs
          retention-days: 30

      - name: Upload post-processing report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: manual-review-${{ env.RC_VERSION }}
          path: src/Maui.RevenueCat.iOS/RevenueCatBindingOutput/manual_review.md
          retention-days: 30

      - name: Prepare xcframework for upload
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          cd src/Maui.RevenueCat.iOS
          mkdir -p artifact-temp
          cp -r RevenueCat.xcframework artifact-temp/

      - name: Upload RevenueCat.xcframework (cleaned)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: RevenueCat-xcframework-${{ env.RC_VERSION }}
          path: src/Maui.RevenueCat.iOS/artifact-temp/
          retention-days: 30

      - name: Create summary
        run: |
          set -euo pipefail
          cd src/Maui.RevenueCat.iOS
          OUTPUT_DIR="RevenueCatBindingOutput"

          {
            echo "## 🎉 iOS Bindings Generated Successfully"
            echo ""
            echo "### 📦 RevenueCat Version: $RC_VERSION"
            echo "### 🔧 Source: built from RevenueCat/purchases-ios @ \`$RC_VERSION\` with \`BYPASS_SIMULATED_STORE_RELEASE_CHECK\`"
            echo "### 📱 iOS SDK: $IOS_SDK"
            echo ""
            echo "### 📄 Generated Files:"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          for f in ApiDefinitions.cs StructsAndEnums.cs; do
            FILE_PATH="$OUTPUT_DIR/$f"
            if [ -f "$FILE_PATH" ]; then
              FILE_SIZE=$(ls -lh "$FILE_PATH" | awk '{print $5}')
              LINE_COUNT=$(wc -l < "$FILE_PATH")
              VERIFY_COUNT=$(grep -c "\[Verify" "$FILE_PATH" 2>/dev/null || echo "0")
              echo "- ✅ **$f**: $FILE_SIZE, $LINE_COUNT lines, $VERIFY_COUNT remaining [Verify] attributes" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          {
            echo ""
            echo "### 📥 Artifacts"
            echo ""
            echo "- **ApiDefinitions-$RC_VERSION** — C# API definitions"
            echo "- **StructsAndEnums-$RC_VERSION** — C# structs and enums"
            echo "- **manual-review-$RC_VERSION** — markdown report of pass-by-pass deltas and detected manual follow-ups"
            echo "- **RevenueCat-xcframework-$RC_VERSION** — cleaned xcframework (no .swiftmodule / .dSYM)"
            echo ""
            echo "### ✅ Automated cleanups already applied"
            echo ""
            echo "Run by \`.github/scripts/postprocess_ios_bindings.cs\` — see the script header for per-pass rules."
            echo ""
            echo "- Stripped all \`[Verify(...)]\` attributes"
            echo "- Commented out \`(AutoGeneratedName = true)\`"
            echo "- Replaced \`NSUrlRequest\` with \`NSMutableUrlRequest\`"
            echo "- Stripped literal \`\\\\n\` escape sequences from \`[Obsoleted(...)]\` strings"
            echo "- Removed members marked \`[Obsoleted(...)]\` or \`[Deprecated(...)]\`"
            echo "- Removed entire interfaces whose lead attributes carry \`[Obsoleted/Deprecated]\`"
            echo "- Stripped device-specific availability attributes (\`[iOS (...)]\`, \`[NoiOS]\`, \`[Mac (...)]\`, \`[Introduced (PlatformName...)]\`, ...)"
            echo "- Removed inherited NSObject methods (\`isEqual:\`, \`description\`, \`debugDescription\`)"
            echo "- Merged \`_RevenueCat_Swift_NNNN\` suffix interfaces into their canonical counterparts"
            echo "- Removed interfaces whose bodies became empty after the above"
            echo "- Added \`INativeObject\` to interfaces used as \`NSDictionary<TKey, TValue>\` value types"
            echo "- Dropped top-level \`delegate\` declarations with no references"
            echo "- Set \`namespace Maui.RevenueCat.iOS\` via sharpie \`-namespace\`"
            echo "- Removed \`*.swiftmodule\` and \`*.dSYM\` directories from the xcframework"
            echo ""
            echo "### 🛡️ Test Store API key support"
            echo ""
            echo "The xcframework is built **from source** with the \`BYPASS_SIMULATED_STORE_RELEASE_CHECK\`"
            echo "Swift compilation flag set in \`Local.xcconfig\` so consumer apps initialised with a"
            echo "RevenueCat Test Store API key (\`test_…\`) do NOT force-close in Release builds."
            echo "Mirrors RevenueCat/purchases-kmp's \`kn-core/build.gradle.kts\`. See issue #116."
            echo ""
            echo "### 📝 Detection-only — review the **manual-review-$RC_VERSION** artifact"
            echo ""
            echo "The script flags but does NOT auto-edit these (judgement required):"
            echo ""
            echo "- Inline \`[BlockCallback] Action<...>\` / \`Func<...>\` parameters — extract to named delegates (otherwise \`Trampolines.g.cs\` fails to compile)"
            echo "- Linker-risk symbols (\`FakeASIdManager\`, \`PaymentQueueWrapper\`, etc.) — drop if linker reports them as undefined"
            echo "- Surviving \`[Verify(...)]\` attributes — should be zero; inspect if present"
            echo "- \`Name = \"...\"\` attribute arguments — drop if Windows build emits symbol-not-found errors"
            echo ""
            echo "### 🚀 Wire-up"
            echo ""
            echo "1. Download the artifacts; review the \`manual-review-$RC_VERSION\` report"
            echo "2. Diff \`ApiDefinitions.cs\` / \`StructsAndEnums.cs\` against the current files in \`src/Maui.RevenueCat.iOS/\` to spot any genuinely new API surface (or removed surface that the wrapper depends on)"
            echo "3. Resolve the detection-only items above"
            echo "4. Replace \`src/Maui.RevenueCat.iOS/nativelib/RevenueCat.xcframework\` with the cleaned xcframework artifact"
            echo "5. Bump \`<Version>\` in \`Maui.RevenueCat.iOS.csproj\` (e.g. \`${RC_VERSION}.0\`) and update \`<PackageReleaseNotes>\`"
            echo "6. Build \`src/Maui.RevenueCat.iOS/Maui.RevenueCat.iOS.csproj\` on macOS to validate"
            echo "7. Open a PR with the updated bindings, xcframework and csproj"
          } >> "$GITHUB_STEP_SUMMARY"
